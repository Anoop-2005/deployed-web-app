<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <!-- Sharp Tech Gradients -->
    <linearGradient id="top-face" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2D3139"/>
      <stop offset="100%" stop-color="#1A1C23"/>
    </linearGradient>
    <linearGradient id="right-face" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#14161B"/>
      <stop offset="100%" stop-color="#0B0C0E"/>
    </linearGradient>
  </defs>
  <!-- Dark Outer Canvas Background -->
  <rect width="32" height="32" rx="6" fill="#121316"/>
  <!-- Isometric 3D Module Object -->
  <!-- Left Side Face -->
  <path d="M 6,16 L 16,21 L 16,30 L 6,24 Z" fill="#1E222B"/>
  <!-- Right Side Face -->
  <path d="M 16,21 L 26,16 L 26,24 L 16,30 Z" fill="url(#right-face)"/>
  <!-- Top Face (Glossy Black) -->
  <path d="M 16,11 L 26,16 L 16,21 L 6,16 Z" fill="url(#top-face)"/>
  <!-- Cybernetic Floating Core -->
  <path d="M 16,4 L 23,7.5 L 16,11 L 9,7.5 Z" fill="#111" stroke="#3A3F4D" stroke-width="1"/>
  <!-- Glowing Neon Tech Data Pipelines -->
  <line x1="16" y1="9" x2="16" y2="28" stroke="#00F5FF" stroke-width="1.5" stroke-linecap="round" opacity="0.9"/>
  <!-- Floating Circuit Node Dots -->
  <circle cx="16" cy="9" r="1.5" fill="#00F5FF"/>
  <circle cx="21" cy="13.5" r="1" fill="#00F5FF" opacity="0.7"/>
  <circle cx="11" cy="13.5" r="1" fill="#00F5FF" opacity="0.7"/>
</svg>
